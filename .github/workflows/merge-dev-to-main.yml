# .github/workflows/merge-dev-to-main.yml
name: Merge dev → main

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: Branch to merge from
        type: string
        default: DEV_Unity6
      target_branch:
        description: Branch to merge into
        type: string
        default: pre-merge
      excluded_paths:
        description: >-
          Space-separated paths (files or dirs) to exclude from the merge. Each is
          forced to match the target: restored if the target has it, deleted if not.
        type: string
        default: CLAUDE.md AGENTS.md Packages ProjectSettings .claude .agents Docs Assets/AddressableAssetsData Assets/Localization Assets/AddressableAssetsData.meta Assets/Localization.meta UserFacingContextFiles

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_branch }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge ${{ inputs.source_branch }} with exclusions
        env:
          SOURCE_BRANCH: ${{ inputs.source_branch }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          EXCLUDED_PATHS: ${{ inputs.excluded_paths }}
        run: |
          if ! git merge "origin/$SOURCE_BRANCH" --no-commit --no-ff; then
            conflicts=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "::error::Merge conflict between $SOURCE_BRANCH and $TARGET_BRANCH in: $conflicts"
            echo "::error::Resolve on $SOURCE_BRANCH (merge $TARGET_BRANCH into it, fix conflicts, push) then re-run this workflow."
            git merge --abort
            exit 1
          fi

          # Force each excluded path to match the target branch, dropping whatever the
          # merge introduced. If the target has the path, restore its version; if not,
          # remove it (a merge adds source-only paths — it never auto-deletes them).
          for path in $EXCLUDED_PATHS; do
            if git cat-file -e "$TARGET_BRANCH:$path" 2>/dev/null; then
              git rm -rf --quiet --ignore-unmatch "$path"
              git checkout "$TARGET_BRANCH" -- "$path"
            else
              git rm -rf --ignore-unmatch "$path"
            fi
          done

          git commit -m "Merge $SOURCE_BRANCH into $TARGET_BRANCH"

      - name: Push
        run: git push origin ${{ inputs.target_branch }}
